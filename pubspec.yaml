name: lingolamp
description: "AI-powered language learning app with Google authentication"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^12.1.3

  # Firebase
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  google_sign_in: ^6.1.6
  google_generative_ai: ^0.4.0

  # Local Storage
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI & UX
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_markdown: ^0.6.18
  flutter_tts: ^3.8.5
  speech_to_text: ^7.1.0
  intl: ^0.18.1

  # AI & APIs
  http: ^1.1.0

  # Utils
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  rxdart: ^0.27.7
  path: ^1.8.3
  uuid: ^4.2.1
  csv: ^5.1.1

  # Development
  cupertino_icons: ^1.0.2
  googleapis_auth: ^1.4.0
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
    - assets/TTS.json

  # Removed assets/icons/ and Roboto font references because they do not exist
